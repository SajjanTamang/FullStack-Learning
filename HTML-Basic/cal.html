<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Calender Elements</title>
</head>
<body>

    <form>
        <fieldset>
            <legend>Calender</legend>

            Date:
            <input type="date" name="date"/><br/><br/>

            Date Time Local:
            <input type="datetime-local" name=""/><br/><br/>

            Time:
            <input type="time" name=""/><br/><br/>

            Month:
            <input type="month" name=""/><br/><br/>

            Week:
            <input type="week" name=""/><br/><br/>

            Range:
            <input type="range" name=""/><br/><br/>

        </fieldset>

    </form>
    
</body>
</html>
