<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Text css</title>
    <style>
        .text{
            width: 600px;
            height: 200px;
            background-color: aqua;
            font-size: 60px;
            color: yellow;
            font-weight: bold;
            font-style: italic;
            text-transform: uppercase;
            text-align: center;
            text-decoration: underline;
            letter-spacing: 11px;
        }
        .para{
            width: 700px;
            height: 200px;
            background-color: lawngreen;
            color: white;
            font-size: 22px;
            text-align: justify;
            word-spacing: 22px;
        }
        .anchor{
            text-decoration: none;
        }
    </style>
</head>
<body>

    <div class="text">
        welcome
    </div>

    <a href="" class="anchor">Tamang</a>

    <p class="para">
        Lorem ipsum dolor sit amet consectetur adipisicing 
        elit. Veniam consectetur nobis quia possimus id 
        modi quaerat voluptatibus, iusto nihil, ipsa natus
         provident sunt unde laborum! Laudantium ipsa 
         doloremque fugit! Dicta!
    </p>
    
</body>
</html>
