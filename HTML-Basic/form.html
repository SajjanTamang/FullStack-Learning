<html>
<head>

    <title>Form</title>
</head>
<body>

    
    <form>

        <fieldset>
            <legend>Enquiry</legend>

        Color: <input type="color" name="color" value="#FF0000"/><br/><br/> 
        Name: <input type="text" name="name" value="sajjan" disabled="" placeholder="First Name" required="" autofocus=""/><br/><br/>
        Address: <textarea name="address" maxlength="33"></textarea><br/><br/>
        Gender: 
            <input type="radio" value="m" name="gender"/> Male
            <input type="radio" value="f" name="gender"/> Female
            <input type="radio" value="o" name="gender"/> Other
        <br/>
        <br/>

        Country :
        <select>

            <option>Please select a country </option>

            <option value="America">America</option>
            <option value="Australia">Australia</option>

            <optgroup label="Asia">
                <option value="Nepal">Nepal</option>
            </optgroup>

            <optgroup label="Europe">
                <option value="UK">UK</option>
            </optgroup>
                
        </select>

        <br/>
        <br/>

        Hobbies
        <input type="checkbox" name="hobbies[]" checked=""/>Dancing
        <input type="checkbox" name="hobbies[]"/>Singing
        <input type="checkbox" name="hobbies[]"/>Painting
        <br/>
        <br/>

        Image:
        <input type="file" name="image"/>
        <br/><br/>

        Age:
        <input type="number" name="Age" min="16" max="43"/><br/><br/>

        <input type="submit" value="Submit"/>
        <input type="reset" value="Reset"/>

        </fieldset>

    </form>
    
</body>
</html>
