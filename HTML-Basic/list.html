<html >
<head>  
    <title>List</title>
</head>
<body>

    <h2>Order List</h2>
    <ol>
        <li>HTML</li>
        <li>CSS</li>
        <li>JavaScript</li>
    </ol>

     <h2>Unorder List</h2>
    <ul>
        <li>HTML</li>
        <li>CSS</li>
        <li>JavaScript</li>
    </ul>

     <h2>Order List</h2>
    <ol type="i">
        <li>HTML</li>
        <li>CSS</li>
        <li>JavaScript</li>
    </ol>

     <h2>Unorder List</h2>
    <ul type="square ">
        <li>HTML</li>
        <li>CSS</li>
        <li>JavaScript</li>
    </ul>

    
</body>
</html>
