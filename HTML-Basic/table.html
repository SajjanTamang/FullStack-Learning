                    <td colspan="1"></td>

            <tr>
                <td > Laravel </td>
                <td> 7000 </td>
                <td>2 Months</td>
            </tr>
                <tr>
                    <td rowspan="1"></td>

                </tr>

        </tbody>
    </table>

</body>
</html>
