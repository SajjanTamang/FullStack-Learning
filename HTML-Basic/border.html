<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Border</title>

    <style>
        .main {
            width: 200px;
            height: 50px;
            border:2px solid red;
        }

        .main1{
            width: 200px;
            height: 50px;
            border-top:10px dashed lightgreen;
            border-bottom:10px dotted aqua;
            border-left:10px solid black;
        }

    </style>

</head>
<body>
    
    <div class="main">Welcome</div>

    <div class="main1">Sajjan</div>

</body>
</html>
