<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Statement</title>
</head>
<body>
    
</body>

    <script>
        // To continue the statement
        for (var i = 0; i<10; i++){
            if (i%2 != 0 ){
                continue;
            }
            document.write(i+ "<br>");
        }
        document.write("<hr>");

        //To Break the Statement
        for(var i = 0; i<=10; i++){
            if( i == 5 ){
                break;
            }
            document.write(i + "<br>");
        }
        document.write("<hr>");

        //Switch statement
        var i = 9;
        switch(i)
        {
            case 1:
            document.write("i is equal to 1");
            break;
        
            case 2:
            document.write("i is equal to 2");
            break;
        
            case 3:
            document.write("i is equal to 3");
            break;
        
            case 4:
            document.write("i is equal to 4");
            break;

            case 5:
            document.write("i is equal to 5");
            break;

            default:
            document.write("i is greater than 5");
        }

    </script>

</html>
