<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Airthemetic Operator</title>
</head>
<body>
    
    <h1 id="add" style="margin: 50px auto; width:300px ;"></h1>
    <h1 id="sub" style="margin: 50px auto; width:300px ;"></h1>
    <h1 id="mult" style="margin: 50px auto; width:300px ;"></h1>
    <h1 id="div" style="margin: 50px auto; width:300px ;"></h1>
    <h1 id="modu" style="margin: 50px auto; width:300px ;"></h1>
    <h1 id="inc" style="margin: 50px auto; width:300px ;"></h1>
    <h1 id="dec" style="margin: 50px auto; width:300px ;"></h1>

</body>

    <script type="text/javascript">
        //addition
        var x = 5;
        var y = 6;
        var z = x+y;
        document.getElementById('add').innerHTML = z;

        //subtraction
        var a = 5;
        var b = 6;
        var c = a-b;
        document.getElementById('sub').innerHTML = c;

        //multiplicaton
        var d = 5;
        var e = 6;
        var f = a*b;
        document.getElementById('mult').innerHTML = f;

        //division
        var g = 5;
        var h = 6;
        var i = a/b;
        document.getElementById('div').innerHTML = i;

        //modulus
        var j = 5;
        var k = 6;
        var l = a%b;
        document.getElementById('modu').innerHTML = l;

        //increment
        var m = 5;
        m++;
        document.getElementById('inc').innerHTML = m;

        //multiplicaton
        var n = 5;
        n--;
        document.getElementById('dec').innerHTML = n;
    </script>

</html>
