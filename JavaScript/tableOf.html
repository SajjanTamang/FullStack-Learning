<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Table of</title>

    <style>
        div{
            border-bottom: 1px solid black;
            width: 100px;
        }
    </style>

</head>
<body>
    
</body>

    <script>
        var num = prompt("Please Enter a Number","");
        for(var i = 1; i <= 10; i ++){
            document.write("<div>");
            document.write(num + " x " + i + " = " + i*num);
            document.write("</div>");
        }
    </script>

</html>
