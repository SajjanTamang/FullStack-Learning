<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">

<body>
    
    <button onclick="openwin()">Github</button>
    <button onclick="closewin()">close</button>

</body>

    <script>
        var window;
        function openwin(){
            win = window.open("https://github.com/","width = 500px", "height = 500px");
        }
        function closewin(){
            win.close();
        }
    </script>
