<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Hovver Effect</title>

    <style>
        #main{
            font-size: 50px;
            text-align: center;
            color: aqua;
            margin-top: 50px;
            cursor: pointer;
            transition: 2s;
        }
    </style>

</head>
<body>

    <div id="main" onmouseenter="modify()" onmouseleave="unmodify()">
        Sajjan Bomjan Tamang
    </div>
    
</body>

    <script>

        function modify(){
            document.getElementById('main').style.fontSize = "100px";
            document.getElementById('main').style.color = "gold";
            document.getElementById('main').style.fontFamily = "cursive";
        }

        function unmodify(){
            document.getElementById('main').style.fontSize = "50px";
            document.getElementById('main').style.color = "aqua";
            document.getElementById('main').style.fontFamily = "";
        }
        
    </script>

</html>
