<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Document</title>
</head>
<body>

    <button onclick="pi()">PI</button>
    <button onclick="otp()">OTP</button>
    
</body>

    <script>
        function pi(){
            var math = Math.PI;
            alert(math);
        }
        document.write("<hr>");

        var x = Math.round(3.8);
        document.write(x);

        document.write("<hr>");

        var y = Math.pow(3,3);
        document.write(y);

        document.write("<hr>");

        var z = Math.sqrt(4);
        document.write(z);

        document.write("<hr>");

        var a = Math.abs(-10);
        document.write(a);

        document.write("<hr>");

        var b = Math.ceil(3.3);
        document.write(b);

        document.write("<hr>");

        var c = Math.floor(3.8);
        document.write(c);

        document.write("<hr>");

        var d = Math.min(11,112,1113);
        document.write(d);

        document.write("<hr>");

        var e = Math.max(111,12,1113);
        document.write(e);

        document.write("<hr>");

        function otp(){
        var f = Math.floor(Math.random()*10000);
        document.write(f);
        }

        


    </script>

</html>
