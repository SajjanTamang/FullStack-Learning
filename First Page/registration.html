<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Document</title>

    <style>

    </style>


</head>
<body>

    <form action="#" method="post" onsubmit="return validate()"></form>
    <p>
        <h1 style="font-size: 30px; text-align: center;">Registraion Form</h1>
    </p>

    <p>
        <label for="username">Username</label>
        <input type="username" name="username" placeholder="Username" type="text" onkeyup="white(this.value)">
    </p> 

    <p>
        <label for="password">Password</label>
        <input type="password" name="password" type="password" id="password" onkeyup="white(this.value)">
    </p>

    <p>
        <label for="confirm_password">Confirm Password</label>
        <input id="confirm_password" name="confirm_password" type="password" onkeyup="check(this)">
        <error id="alert-caps"></error>
        <error id="alert"></error>
    </p>

    <p>
        <input type="submit" name="submit" value="SUBMIT"/>
    </p>



</body>

<script>
    var password = document.getElementById('password');
    var flag = 1; //1  -> no error | 0 -> yes error
    function check(elem){
        if(elem.value.length > 0 ){
            if(elem.value != password.value){
                document.getElementById('alert').innerText = "confirm password doesnot match";
                flag = 0;
            }else{
                document.getElementById('alert').innerText = "";
                flag = 1;
            }
        }else{
            document.getElementById('alert').innerText = "Please Enter Confirm Password";
            flag = 0;
        }

        function validate(){
            if(flag == 1){
                return true;
            }else{
                return false;
            }
        }
    }

    window.addEventListener('keyup', event => {
        var isCaps = event.getModifierState('CapsLock');
        if(isCaps){
            document.getElementById('alert').innerHTML = "WARNING! CapsLock is on";
        }else{
            document.getElementById('alert').innerHTML = "";
        }
    })

    var pattern = /\s/g;
    var alert = document.getElementById('alert-caps');
    function white(data){
        var isSpace = pattern.test(data);
        if(isSpace){
            alert.innerText = "Space is not allowed";
        }else{
            alert.innerText = "";
        }
    }

</script>

</html>
