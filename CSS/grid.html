<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Grid</title>

    <style>
        .main{
            width: 700px;
            height: 600px;
            border: 2px solid red;
            margin: auto;
            padding: 10px;
            display: grid;
            grid-template-columns: auto auto auto auto;
            /*
            grid-column-gap: 10px;
            grid-row-gap: 10px;
            */
            grid-gap: 10px 10px;
        }
        .main div{
            padding: 50px;
            background-color: aqua;
            font-size: 22px;
            border: 2px solid black;
        }
        #div1{
            grid-column-start: 1;
            grid-column-end: 3;
        }
        #div8{
            grid-row-start: 8;
            grid-row-end: 5;
        }
    </style>
</head>
<body>

    <div class="main">
        <div id="div1">1</div>
        <div>2</div>
        <div>3</div>
        <div>4</div>
        <div>5</div>
        <div>6</div>
        <div>7</div>
        <div id="div8">8</div>
    </div>
    
</body>
</html>
