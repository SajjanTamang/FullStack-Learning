<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>BG</title>

    <style>
        .main{
            width: 500px;
            height: 500px;
            border: 2px solid red;
            margin: auto;
            font-size: 35px;
            text-align: center;
            /*
            r = 255
            g = 0
            b = 255
            a =  0 - 1, 0.1, 0.2,
            */
            background-color: rgba(157, 10, 108, 0.873);
            /*
            box-shadow:
            x-axis | y-axis | blur | range | color;
            */
            box-shadow: -10px 0px 10px 5px gray;
        }
    </style>

</head>
<body>

    <div class="main">
        Tamang
    </div>    
    
</body>
</html>
