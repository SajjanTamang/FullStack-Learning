<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Opacity</title>

    <style>
        .main{
            width: 500px;
            height: 500px;
            background-color: aqua;
            opacity: 0.2;
            transition: 2s;
            float: left;
        }
        .main:hover{
            opacity: 1;
        }
        .bgchange{
            width: 500px;
            height: 500px;
            background-color: gold;
            transition: 1.5s;
            float: left;
        }
        .bgchange:hover{
            background-color: darkgreen;
        }
    </style>
</head>
<body>
    <div class="main"></div>
    <div class="bgchange"></div>
    
</body>
</html>
