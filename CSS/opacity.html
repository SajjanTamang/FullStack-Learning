<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Opacity</title>

    <style>
        .box{
            width: 500px;
            height: 500px;
            margin: auto;
            position: relative;
        }
        .add{
            width: 100%;
            font-size: 30px;
            background-color: gold;
            color: white;
            position: absolute;
            left: 0px;
            bottom: -30px;
            opacity: 0;
            transition: 1s;
        }
        .box:hover .add{
            bottom: 0px;
            opacity: 1;
        }
        .main{
            width: 500px;
            height: 500px;
            background-color: aqua;
            opacity: 0.2;
            transition: 2s;
            float: left;
        }
        .main:hover{
            opacity: 1;
        }
        .bgchange{
            width: 500px;
            height: 500px;
            background-color: gold;
            transition: 1.5s;
            float: left;
        }
        .bgchange:hover{
            background-color: darkgreen;
        }
    </style>
</head>
<body>
    <div class="box">
        <img src="1.jpg" width="500px" height="500px"/>
        <input type="button" name="" value="Add To Cart" class="add"/>
    </div>
    <div class="main"></div>
    <div class="bgchange"></div>
    
</body>
</html>
