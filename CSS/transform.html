<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Transform</title>

    <style>
        .main{
            width:  100px;
            height: 100px;
            border: 2px solid black;
            margin: auto;
            margin-top: 100px;
            background-color: rgba(200, 0, 0 ,0.5);
            /*
                translate(x,y);
            */
            transform: translate(100px,0px);
            /*
                skew(  ,  ) deg , rad , turn
                skew(x);
                skew(y);
            */
            transform: skew(1turn, 10deg);
            /*
                rotate(deg|rad);
                rotateX();
                rotateY();
                rotateZ();
            */
            transform: rotate(70deg);
            /*
                scale();
            */
            transform: scale(2);
        }
    </style>
</head>
<body>

    <div class="main">

    </div>
    
</body>
</html>
